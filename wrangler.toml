name = "qingyu-weather-pay"
main = "worker/payment-worker.js"
compatibility_date = "2024-01-01"

# KV namespace for storing payment verification codes
# Run: wrangler kv:namespace create "PAID_THEMES"
# Then replace the id below with the returned id
[[kv_namespaces]]
binding = "PAID_THEMES"
id = "YOUR_KV_NAMESPACE_ID"
