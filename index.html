<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#102544" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="晴雨天气" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>晴雨天气</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="icon" sizes="192x192" href="./icon-192.png" />
  <link rel="icon" sizes="512x512" href="./icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="preload" href="./styles.css?v=15" as="style" />
  <link rel="preload" href="./app.js?v=20" as="script" />
  <link rel="stylesheet" href="./styles.css?v=15" />
</head>
<body>
  <div class="pull-indicator" id="pullIndicator">↓ 下拉刷新</div>
  <main class="app-shell">
    <section class="weather-card">
      <section class="location-settings">
        <div>
          <h2 id="cityName">上海市 · 黄浦区</h2>
        </div>

        <button class="location-button" id="locationButton" type="button">位置设置</button>
      </section>

      <div class="forecast-grid">
        <section class="row" id="hourlyPanel" hidden>
          <div class="row-title">
            <h2>未来 24 小时</h2>
          </div>
          <div class="hourly-list" id="hourlyList"></div>
        </section>

        <section class="row" id="dailyPanel" hidden>
          <div class="row-title">
            <h2>未来 7 天</h2>
          </div>
          <div class="daily-list" id="dailyList"></div>
        </section>
      </div>
    </section>

    <div class="bottom-actions">
      <button class="donate-button" id="donateButton" type="button">☕ 打赏创作者</button>
      <button class="feedback-button" id="feedbackButton" type="button">💬 问题反馈</button>
    </div>
  </main>

  <dialog class="feedback-dialog" id="feedbackDialog">
    <form class="feedback-dialog-card" id="feedbackForm" method="dialog">
      <div class="feedback-dialog-header">
        <h3>💬 问题反馈</h3>
        <button class="dialog-close" id="closeFeedbackDialog" type="button" aria-label="关闭">×</button>
      </div>
      <p class="feedback-dialog-desc">遇到问题或有建议？请告诉我们，我们会尽快改进。</p>
      <textarea
        class="feedback-input"
        id="feedbackInput"
        placeholder="请描述你遇到的问题或建议..."
        rows="4"
        required
      ></textarea>
      <button class="feedback-submit" type="submit">提交反馈</button>
    </form>
  </dialog>

  <dialog class="feedback-dialog" id="feedbackListDialog">
    <form class="feedback-dialog-card" method="dialog">
      <div class="feedback-dialog-header">
        <h3>📋 反馈列表</h3>
        <button class="dialog-close" id="closeFeedbackListDialog" type="button" aria-label="关闭">×</button>
      </div>
      <div class="feedback-list" id="feedbackList"></div>
      <button class="feedback-export" id="feedbackExport" type="button">导出反馈</button>
    </form>
  </dialog>

  <dialog class="donate-dialog" id="donateDialog">
    <form class="donate-dialog-card" method="dialog">
      <div class="donate-dialog-header">
        <h3>☕ 打赏创作者</h3>
        <button class="dialog-close" id="closeDonateDialog" type="button" aria-label="关闭">×</button>
      </div>
      <p class="donate-dialog-desc">如果这个天气 App 对你有帮助，欢迎打赏支持～</p>
      <div class="donate-qr-link">
        <img class="donate-qr" src="./donate-qr.jpeg" alt="微信收款二维码" />
      </div>
      <p class="donate-tip">请截图保存到相册，然后用微信扫一扫识别😊</p>
    </form>
  </dialog>

  <dialog class="city-dialog" id="cityDialog">
    <form class="city-dialog-card" id="cityForm" method="dialog">
      <div class="city-dialog-header">
        <h3>选择城市位置</h3>
        <button class="dialog-close" id="closeCityDialog" type="button" aria-label="关闭">×</button>
      </div>

      <input
        class="city-input"
        id="cityInput"
        type="search"
        placeholder="输入城市或区县，例如：北京、杭州、黄浦区"
        autocomplete="off"
        aria-label="输入城市或区县"
      />

      <div class="city-suggestions" id="citySuggestions" hidden></div>

      <div class="city-options" aria-label="常用城市">
        <button type="button" data-city="上海">上海</button>
        <button type="button" data-city="北京">北京</button>
        <button type="button" data-city="广州">广州</button>
        <button type="button" data-city="深圳">深圳</button>
        <button type="button" data-city="杭州">杭州</button>
        <button type="button" data-city="成都">成都</button>
      </div>

      <button class="city-submit" type="submit">确定</button>
    </form>
  </dialog>

  <template id="hourlyTemplate">
    <article class="hourly-card">
      <p class="hourly-time"></p>
      <div class="hourly-icon"></div>
      <span class="hourly-info"><strong class="hourly-temp"></strong><span class="hourly-extra"></span></span>
    </article>
  </template>

  <template id="dailyTemplate">
    <article class="daily-card">
      <p class="daily-date"></p>
      <div class="daily-icon"></div>
      <span class="daily-info"><strong class="daily-temp"></strong><span class="daily-extra"></span></span>
    </article>
  </template>

  <script src="./city-data.js?v=2"></script>
  <script src="./app.js?v=20" defer></script>
</body>
</html>
