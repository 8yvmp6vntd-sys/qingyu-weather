<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#102544" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="晴雨天气" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>晴雨天气</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=2" />
</head>
<body>
  <main class="app-shell">
    <section class="weather-card">
      <section class="location-settings">
        <div>
          <h2 id="cityName">上海市 · 黄浦区</h2>
        </div>

        <button class="location-button" id="locationButton" type="button">位置设置</button>
      </section>

      <section class="row" id="hourlyPanel" hidden>
        <div class="row-title">
          <h2>未来 24 小时</h2>
        </div>
        <div class="hourly-list" id="hourlyList"></div>
      </section>

      <section class="row" id="dailyPanel" hidden>
        <div class="row-title">
          <h2>未来 5 天</h2>
        </div>
        <div class="daily-list" id="dailyList"></div>
      </section>
    </section>
  </main>

  <dialog class="city-dialog" id="cityDialog">
    <form class="city-dialog-card" id="cityForm" method="dialog">
      <div class="city-dialog-header">
        <h3>选择城市位置</h3>
        <button class="dialog-close" id="closeCityDialog" type="button" aria-label="关闭">×</button>
      </div>

      <input
        class="city-input"
        id="cityInput"
        type="search"
        placeholder="输入城市或区县，例如：北京、杭州、黄浦区"
        autocomplete="off"
        aria-label="输入城市或区县"
      />

      <div class="city-suggestions" id="citySuggestions" hidden></div>

      <div class="city-options" aria-label="常用城市">
        <button type="button" data-city="上海">上海</button>
        <button type="button" data-city="北京">北京</button>
        <button type="button" data-city="广州">广州</button>
        <button type="button" data-city="深圳">深圳</button>
        <button type="button" data-city="杭州">杭州</button>
        <button type="button" data-city="成都">成都</button>
      </div>

      <button class="city-submit" type="submit">确定</button>
    </form>
  </dialog>

  <template id="hourlyTemplate">
    <article class="hourly-card">
      <p class="hourly-time"></p>
      <div class="hourly-icon"></div>
      <strong class="hourly-temp"></strong>
      <p class="hourly-extra"></p>
    </article>
  </template>

  <template id="dailyTemplate">
    <article class="daily-card">
      <p class="daily-date"></p>
      <div class="daily-icon"></div>
      <strong class="daily-temp"></strong>
      <p class="daily-extra"></p>
    </article>
  </template>

  <script src="./city-data.js?v=2"></script>
  <script src="./app.js?v=7"></script>
</body>
</html>
